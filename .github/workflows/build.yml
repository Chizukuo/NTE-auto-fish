name: Build Executable

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11" # PyInstaller generally works well with 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        # Build the GUI version
        pyinstaller --noconfirm --onedir --windowed --icon=NONE --exclude-module tkinter --exclude-module unittest --exclude-module email --exclude-module http --exclude-module xml --exclude-module pydoc --exclude-module multiprocessing --add-data "templates;templates" --name NTE-Auto-Fish start_gui.py
        
        # Build the headless version (optional)
        pyinstaller --noconfirm --onedir --console --icon=NONE --exclude-module tkinter --exclude-module unittest --exclude-module email --exclude-module http --exclude-module xml --exclude-module pydoc --exclude-module multiprocessing --add-data "templates;templates" --name NTE-Auto-Fish-CLI main.py

    - name: Upload GUI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NTE-Auto-Fish-GUI-Windows
        path: dist/NTE-Auto-Fish

    - name: Upload CLI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NTE-Auto-Fish-CLI-Windows
        path: dist/NTE-Auto-Fish-CLI
