name: Release and Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: simple
          version-file: version.txt

  build:
    runs-on: windows-latest
    if: |
      always() &&
      (github.event_name != 'push' || needs.release-please.outputs.release_created == 'true')
    needs: [release-please]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build GUI (single EXE)
      shell: bash
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=NONE \
          --add-data "templates;templates" \
          --exclude-module tkinter \
          --exclude-module unittest \
          --exclude-module test \
          --exclude-module email \
          --exclude-module http \
          --exclude-module xml \
          --exclude-module pydoc \
          --exclude-module multiprocessing \
          --exclude-module asyncio \
          --exclude-module sqlite3 \
          --exclude-module lib2to3 \
          --exclude-module distutils \
          --exclude-module setuptools \
          --exclude-module _decimal \
          --exclude-module _lzma \
          --exclude-module _bz2 \
          --name NTE-Auto-Fish \
          start_gui.py

    - name: Build CLI (single EXE)
      shell: bash
      run: |
        pyinstaller --noconfirm --onefile --console --icon=NONE \
          --add-data "templates;templates" \
          --exclude-module tkinter \
          --exclude-module unittest \
          --exclude-module test \
          --exclude-module email \
          --exclude-module http \
          --exclude-module xml \
          --exclude-module pydoc \
          --exclude-module multiprocessing \
          --exclude-module asyncio \
          --exclude-module sqlite3 \
          --exclude-module lib2to3 \
          --exclude-module distutils \
          --exclude-module setuptools \
          --exclude-module _decimal \
          --exclude-module _lzma \
          --exclude-module _bz2 \
          --exclude-module dearpygui \
          --name NTE-Auto-Fish-CLI \
          main.py

    - name: Upload GUI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NTE-Auto-Fish-GUI-Windows
        path: dist/NTE-Auto-Fish.exe

    - name: Upload CLI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NTE-Auto-Fish-CLI-Windows
        path: dist/NTE-Auto-Fish-CLI.exe

    - name: Upload Release Artifacts
      if: needs.release-please.outputs.release_created == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.release-please.outputs.tag_name }}
        files: |
          dist/NTE-Auto-Fish.exe
          dist/NTE-Auto-Fish-CLI.exe
